<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartPrice – Price Prediction</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <p class="tag">SmartPrice</p>
        <h1>Predict device prices with practical ML</h1>
        <p class="subtitle">
          Enter product specs and get a fast price estimate based on historical
          device data.
        </p>
      </header>

      <main class="card">
        <form id="predict-form">
          <div class="grid">
            <label>
              Brand
              <select name="brand" required>
                <option value="Apple">Apple</option>
                <option value="Samsung">Samsung</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="OnePlus">OnePlus</option>
                <option value="Dell">Dell</option>
                <option value="HP">HP</option>
                <option value="Lenovo">Lenovo</option>
                <option value="Asus">Asus</option>
              </select>
            </label>
            <label>
              RAM (GB)
              <input type="number" name="ram" min="2" max="64" value="8" required />
            </label>
            <label>
              Storage (GB)
              <input type="number" name="storage" min="32" max="2048" value="128" required />
            </label>
            <label>
              Processor Speed (GHz)
              <input type="number" name="processor_speed" min="1" max="5" step="0.1" value="2.8" required />
            </label>
            <label>
              Battery (mAh)
              <input type="number" name="battery_capacity" min="2000" max="7000" value="4500" required />
            </label>
            <label>
              Camera (MP)
              <input type="number" name="camera_mp" min="8" max="200" value="48" required />
            </label>
          </div>
          <button type="submit">Predict Price</button>
        </form>
        <div class="result" id="result">Enter specs and predict a price.</div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
